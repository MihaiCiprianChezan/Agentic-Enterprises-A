# Local hooks running the same gates as CI (ruff + mypy from the [dev] install).
# Enable with: pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy (strict on src/cell)
        entry: mypy
        language: system
        pass_filenames: false
        files: ^src/
